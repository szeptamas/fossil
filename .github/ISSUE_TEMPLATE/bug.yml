name: Watch app bug
description: Report a reproducible Fossil Hybrid HR app problem
title: "[Bug] "
labels: []
body:
  - type: input
    id: app
    attributes:
      label: App identifier
      placeholder: lionHelloApp
    validations:
      required: true
  - type: input
    id: watch
    attributes:
      label: Watch model
      value: Fossil Hybrid HR Collider
    validations:
      required: true
  - type: input
    id: gadgetbridge
    attributes:
      label: Gadgetbridge version/build
    validations:
      required: true
  - type: dropdown
    id: watchface
    attributes:
      label: Active watchface
      options:
        - Gadgetbridge-generated customWatchFace
        - Stock Fossil watchface
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: observed
    attributes:
      label: Observed result
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Build output, artifact path, screenshots, logs, or watch behavior.
